version: "3.9"
services:
  app:
    build: .
    command: ["autodata", "run-inner-loop", "--budget", "5"]
    environment:
      AUTODATA_ENVIRONMENT: dev
    volumes:
      - ./artifacts:/app/artifacts

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: autodata
      POSTGRES_PASSWORD: autodata
      POSTGRES_DB: autodata
    ports:
      - "5432:5432"
